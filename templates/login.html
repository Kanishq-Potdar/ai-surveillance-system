<!doctype html>
<html>
  <head>
    <title>Surveillance — Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .box {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 40px;
        width: 340px;
      }
      h1 {
        color: #00ff99;
        margin: 0 0 24px;
        font-size: 22px;
      }
      input {
        width: 100%;
        background: #0f0f0f;
        border: 1px solid #333;
        color: #e0e0e0;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 14px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        background: #00ff99;
        color: #0f0f0f;
        border: none;
        padding: 12px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #00cc7a;
      }
      .error {
        background: #2a1a1a;
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 14px;
      }
      .link {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: #888;
      }
      .link a {
        color: #00ff99;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Surveillance Login</h1>

      <!-- Show flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="error">{{ message }}</div>
      {% endfor %} {% endwith %}

      <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>

      <div class="link">
        Don't have an account? <a href="/register">Register</a>
      </div>
    </div>
  </body>
</html>
