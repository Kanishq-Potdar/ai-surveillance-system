<!doctype html>
<html>
  <head>
    <title>AI Surveillance Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        padding: 20px;
      }
      h1 {
        color: #00ff99;
      }

      /* Stats bar at the top */
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .stat-box {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 16px 24px;
        text-align: center;
      }
      .stat-box h2 {
        color: #00ff99;
        margin: 0;
        font-size: 32px;
      }
      .stat-box p {
        margin: 4px 0 0;
        color: #888;
        font-size: 13px;
      }

      /* Search bar */
      input {
        background: #1a1a1a;
        border: 1px solid #333;
        color: #e0e0e0;
        padding: 10px 16px;
        border-radius: 6px;
        width: 300px;
        font-size: 14px;
        margin-bottom: 16px;
      }

      /* Events table */
      table {
        width: 100%;
        border-collapse: collapse;
        background: #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
      }
      th {
        background: #222;
        padding: 12px 16px;
        text-align: left;
        color: #00ff99;
        font-size: 13px;
        text-transform: uppercase;
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid #222;
        font-size: 14px;
      }
      tr:hover td {
        background: #222;
      }

      /* Confidence colour coding */
      .high {
        color: #00ff99;
      }
      .medium {
        color: #ffaa00;
      }
      .low {
        color: #ff4444;
      }

      /* Label badges */
      .badge {
        background: #333;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>AI Surveillance Dashboard</h1>
    <a href="/charts" style="color: #00ff99; font-size: 14px">View Charts →</a>
    <!-- Stats bar -->
    <div class="stats">
      <div class="stat-box">
        <h2 id="total-count">0</h2>
        <p>Total Events</p>
      </div>
      <div class="stat-box">
        <h2 id="person-count">0</h2>
        <p>Persons Detected</p>
      </div>
      <div class="stat-box">
        <h2 id="car-count">0</h2>
        <p>Cars Detected</p>
      </div>
    </div>

    <!-- Search bar -->
    <input
      type="text"
      id="search"
      placeholder="Search by label, camera, time..."
      onkeyup="filterTable()"
    />

    <!-- Events table -->
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Timestamp</th>
          <th>Label</th>
          <th>Confidence</th>
          <th>Camera</th>
        </tr>
      </thead>
      <tbody id="events-body">
        <!-- Rows inserted by JavaScript below -->
      </tbody>
    </table>

    <script>
      let allEvents = [];

      // Fetch events from your /events API
      async function loadEvents() {
        const response = await fetch("/events");
        allEvents = await response.json();
        renderTable(allEvents);
        updateStats(allEvents);
      }

      // Render rows into the table
      function renderTable(events) {
        const tbody = document.getElementById("events-body");
        tbody.innerHTML = "";

        events.forEach((e) => {
          const conf = e.confidence;
          const confClass =
            conf >= 0.75 ? "high" : conf >= 0.55 ? "medium" : "low";

          tbody.innerHTML += `
                    <tr>
                        <td>${e.id}</td>
                        <td>${e.timestamp}</td>
                        <td><span class="badge">${e.label}</span></td>
                        <td class="${confClass}">${(conf * 100).toFixed(0)}%</td>
                        <td>${e.camera_id}</td>
                    </tr>
                `;
        });
      }

      // Update stats at the top
      function updateStats(events) {
        document.getElementById("total-count").textContent = events.length;
        document.getElementById("person-count").textContent = events.filter(
          (e) => e.label === "person",
        ).length;
        document.getElementById("car-count").textContent = events.filter(
          (e) => e.label === "car",
        ).length;
      }

      // Filter table based on search input
      function filterTable() {
        const query = document.getElementById("search").value.toLowerCase();
        const filtered = allEvents.filter(
          (e) =>
            e.label.includes(query) ||
            e.camera_id.toLowerCase().includes(query) ||
            e.timestamp.includes(query),
        );
        renderTable(filtered);
      }

      // Auto refresh every 5 seconds to show new detections
      loadEvents();
      setInterval(loadEvents, 5000);
    </script>
  </body>
</html>
